---
apiVersion: application.ingext.io/v1
kind: AppConfig
metadata:
  name: Office365
spec:
  icon: "https://fluency-public.s3.us-east-1.amazonaws.com/icons/office365.png"
  category: office
  resourceGroups:
    - Office365
  description: "Office365 audit event"
  displayName: "Office365"
  adminConsent: false
  parameters:
    - name: tenantID
      description: "Azure Tenant ID"
      dataType: string
      defaultValue: ""
    - name: clientId
      description: "Azure ClientID"
      dataType: string
      defaultValue: ""
    - name: clientSecret
      description: "Azure ClientSecret"
      sensitive: true  
    - name: datalake
      description: "datalake"
      dataType: string
      defaultValue: "managed"
    - name: index
      description: "datalake index name"
      dataType: string
      defaultValue: "default"      
---
apiVersion: application.ingext.io/v1
kind: Router
metadata:
  name: "{{ .Application }}-{{ .AppInstance }}"
spec:
  threadCount: 1
---
apiVersion: application.ingext.io/v1
kind: Pipe
metadata:
  name: "{{ .Application }}-{{ .AppInstance }}"
spec:
  name: main
  processors:
    - Office365-Adjustments
  sinks:
    - "{{ .Application }}-{{ .AppInstance }}"
  router: "{{ .Application }}-{{ .AppInstance }}"
---
apiVersion: application.ingext.io/v1
kind: Processor
metadata:
  name: Office365-Adjustments
spec:
  type: parser
  local: Office365_Adjustments
---
apiVersion: application.ingext.io/v1
kind: DataSource
metadata:
  name: "{{ .Application }}-{{ .AppInstance }}"
spec:
  type: plugin
  format: json
  router: "{{ .Application }}-{{ .AppInstance }}"
  config:
    plugin:
      integration: "{{ .Application }}-{{ .AppInstance }}"
---
apiVersion: application.ingext.io/v1
kind: DataSink
metadata:
  name: "{{ .Application }}-{{ .AppInstance }}"
spec:
  type: datalake
  config:
    datalake:
      datalake: "{{ .UserInput.datalake }}"
      index:  "{{ .UserInput.index }}"
---
apiVersion: application.ingext.io/v1
kind: Integration
metadata:
  name: "{{ .Application }}-{{ .AppInstance }}"
spec:
  type: Office365
  config:
    tenantID: "{{ .UserInput.tenantID }}"
    clientId: "{{ .UserInput.clientId }}"
  secret:
    clientSecret: "{{ .UserInput.clientSecret }}"
